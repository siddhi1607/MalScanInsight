<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Password Strength Analyzer</title>
<link rel="stylesheet" href="css/passwordScanner.css">
</head>

<body class="dark-bg">

  <button class="back-btn" onclick="window.location.href='index.html'">
    ← Back
  </button>

  <div class="scanner-box cyber-card center">

    <div class="logo glow-logo">🔐</div>

    <h2 class="section-title">Password Strength Analyzer</h2>
    <p class="subtitle">
      Analyze password security using entropy-based cryptographic strength
    </p>

    <div class="password-wrapper">
      <input
        type="password"
        id="passwordInput"
        placeholder="Enter password to analyze"
        oninput="checkPassword()"
      />
      <span class="eye" onclick="togglePassword()">👁️</span>
    </div>

    <div class="strength-bar neon-border">
      <div id="strengthFill"></div>
    </div>

    <p id="strengthText" class="strength-text"></p>
    <p id="entropyText" class="entropy-text"></p>

    <div class="scanner-line"></div>
  </div>

  <script src="js/passwordScanner.js"></script>
</body>
</html>
